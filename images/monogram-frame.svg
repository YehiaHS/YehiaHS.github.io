<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="mf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a3d;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4a8f5c;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="mf2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3526;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#63b476;stop-opacity:0.04"/>

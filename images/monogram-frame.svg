    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a3d;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#4a8f5c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2d5a3d;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="396" height="496" rx="0" fill="url(#mf2)"/>

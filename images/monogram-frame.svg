  <line x1="150" y1="280" x2="250" y2="280" stroke="#2d5a3d" stroke-width="0.8" opacity="0.15"/>
  <text x="200" y="310" font-family="sans-serif" font-size="9" fill="#2d5a3d" text-anchor="middle" letter-spacing="4" opacity="0.12">EST. 2024</text>
